# Replaces vercel.json crons. Each job curls the in-cluster Service with the
# CRON_SECRET bearer token. Schedules mirror vercel.json exactly.
# NOTE: schedules are evaluated in the cluster's timezone (UTC on most k3s nodes).
apiVersion: batch/v1
kind: CronJob
metadata:
  name: codepylot-scheduler
  namespace: codepylot
  labels:
    app: codepylot
spec:
  schedule: "* * * * *" # heartbeat agent wake-ups + routine triggers
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      activeDeadlineSeconds: 280
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: curl
              image: curlimages/curl:8.11.1
              env:
                - name: CRON_SECRET
                  valueFrom:
                    secretKeyRef:
                      name: codepylot-secret
                      key: CRON_SECRET
              command: ["/bin/sh", "-c"]
              args:
                - curl -sf -X POST -H "Authorization: Bearer $CRON_SECRET" http://codepylot.codepylot.svc.cluster.local/api/cron/scheduler
              resources:
                requests: { cpu: 10m, memory: 16Mi }
                limits: { cpu: 50m, memory: 32Mi }
---
