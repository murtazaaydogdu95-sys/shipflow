apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "codepylot.fullname" . }}
  labels:
    {{- include "codepylot.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "codepylot.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "codepylot.selectorLabels" . | nindent 8 }}
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "codepylot.fullname" . }}-config
            - secretRef:
                name: {{ include "codepylot.fullname" . }}-secret
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: repos
              mountPath: /app/repos
      volumes:
        - name: repos
          persistentVolumeClaim:
            claimName: {{ include "codepylot.fullname" . }}-repos
