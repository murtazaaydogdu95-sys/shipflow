{{- if and .Values.backup.enabled .Values.postgresql.enabled }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "codepylot.fullname" . }}-backups
  labels:
    {{- include "codepylot.labels" . | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  {{- if .Values.postgresql.storage.storageClass }}
  storageClassName: {{ .Values.postgresql.storage.storageClass }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.postgresql.storage.size }}
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "codepylot.fullname" . }}-backup
  labels:
    {{- include "codepylot.labels" . | nindent 4 }}
    app.kubernetes.io/component: backup
spec:
  schedule: {{ .Values.backup.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: backup
              image: {{ .Values.postgresql.image }}
              resources:
                limits:
                  cpu: 200m
                  memory: 256Mi
                requests:
                  cpu: 50m
                  memory: 64Mi
              env:
                - name: PGHOST
                  value: {{ include "codepylot.fullname" . }}-postgresql
                - name: PGUSER
                  valueFrom:
                    secretKeyRef:
                      name: {{ include "codepylot.fullname" . }}-secret
                      key: POSTGRES_USER
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: {{ include "codepylot.fullname" . }}-secret
                      key: POSTGRES_PASSWORD
                - name: PGDATABASE
                  valueFrom:
                    secretKeyRef:
                      name: {{ include "codepylot.fullname" . }}-secret
                      key: POSTGRES_DB
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  TIMESTAMP=$(date +%Y%m%d_%H%M%S)
                  BACKUP_FILE="/backups/codepylot_${TIMESTAMP}.sql.gz"

                  echo "Starting backup: ${BACKUP_FILE}"
                  pg_dump -Fc "${PGDATABASE}" | gzip > "${BACKUP_FILE}"
                  echo "Backup complete: ${BACKUP_FILE}"

                  # Cleanup old daily backups (keep last N days)
                  echo "Cleaning up backups older than {{ .Values.backup.retention.days }} days..."
                  find /backups -name "codepylot_*.sql.gz" -mtime +{{ .Values.backup.retention.days }} -delete

                  echo "Remaining backups:"
                  ls -lh /backups/
              volumeMounts:
                - name: backups
                  mountPath: /backups
          volumes:
            - name: backups
              persistentVolumeClaim:
                claimName: {{ include "codepylot.fullname" . }}-backups
{{- end }}
