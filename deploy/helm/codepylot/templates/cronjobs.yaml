{{- $fullName := include "codepylot.fullname" . -}}
{{- $labels := include "codepylot.labels" . -}}
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ $fullName }}-scheduler
  labels:
    {{- $labels | nindent 4 }}
    app.kubernetes.io/component: cronjob-scheduler
spec:
  schedule: {{ .Values.cronjobs.scheduler.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: scheduler
              image: curlimages/curl:latest
              resources:
                limits:
                  cpu: 50m
                  memory: 32Mi
                requests:
                  cpu: 10m
                  memory: 16Mi
              command:
                - /bin/sh
                - -c
                - |
                  curl -sf -X POST \
                    -H "Authorization: Bearer $(CRON_SECRET)" \
                    "http://{{ $fullName }}:{{ .Values.service.port }}/api/cron/recurring"
              env:
                - name: CRON_SECRET
                  valueFrom:
                    secretKeyRef:
                      name: {{ $fullName }}-secret
                      key: CRON_SECRET
