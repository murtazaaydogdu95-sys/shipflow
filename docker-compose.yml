services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: shipflow
      POSTGRES_PASSWORD: shipflow
      POSTGRES_DB: shipflow
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shipflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  ollama-pull:
    image: curlimages/curl:latest
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: ["curl", "-sf", "http://ollama:11434/api/pull", "-d", "{\"name\": \"llama3.2\"}"]
    restart: "no"

  shipflow:
    build: .
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - path: .env
        required: true
    environment:
      DATABASE_URL: postgresql://shipflow:shipflow@postgres:5432/shipflow
      OLLAMA_URL: http://ollama:11434/v1
      AUTH_SECRET: docker-dev-secret-change-in-production
      AUTH_TRUST_HOST: "true"
      NEXTAUTH_URL: http://localhost:3000
      SEED_DATABASE: "true"
      SHIPFLOW_REPOS_DIR: /app/repos
    volumes:
      - repos_data:/app/repos

volumes:
  pgdata:
  ollama_data:
  repos_data:
