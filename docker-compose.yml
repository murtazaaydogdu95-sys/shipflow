services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: codepylot
      POSTGRES_PASSWORD: codepylot
      POSTGRES_DB: codepylot
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U codepylot"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-backup:
    image: prodrigestivill/postgres-backup-local:16
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: codepylot
      POSTGRES_USER: codepylot
      POSTGRES_PASSWORD: codepylot
      SCHEDULE: "0 2 * * *"
      BACKUP_KEEP_DAYS: 7
      BACKUP_KEEP_WEEKS: 4
      BACKUP_KEEP_MONTHS: 6
    volumes:
      - db_backups:/backups
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  ollama-pull:
    image: curlimages/curl:latest
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: ["curl", "-sf", "http://ollama:11434/api/pull", "-d", "{\"name\": \"llama3.2\"}"]
    restart: "no"

  codepylot:
    build: .
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - path: .env
        required: true
    environment:
      DATABASE_URL: postgresql://codepylot:codepylot@postgres:5432/codepylot
      OLLAMA_URL: http://ollama:11434/v1
      AUTH_TRUST_HOST: "true"
      NEXTAUTH_URL: http://localhost:3000
      CODEPYLOT_REPOS_DIR: /app/repos
    volumes:
      - repos_data:/app/repos

volumes:
  pgdata:
  ollama_data:
  repos_data:
  db_backups:
