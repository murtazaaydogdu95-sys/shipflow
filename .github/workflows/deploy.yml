name: Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "**.md"
      - ".github/workflows/ci.yml"
  workflow_dispatch:  # Allow manual deploys from GitHub UI

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── Step 1: Run tests before deploying ─────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npm run test

  # ── Step 2: Build and push Docker image ────────────────────
  build:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write

    outputs:
      image-tag: ${{ steps.meta.outputs.version }}
      image-digest: ${{ steps.build.outputs.digest }}

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  # ── Step 3: Deploy to Kubernetes ───────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment: production
    concurrency:
      group: deploy-production
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Verify cluster access
        run: kubectl cluster-info

      - name: Create namespace if needed
        run: kubectl create namespace codepylot --dry-run=client -o yaml | kubectl apply -f -

      - name: Create image pull secret
        run: |
          kubectl -n codepylot create secret docker-registry ghcr-pull-secret \
            --docker-server=${{ env.REGISTRY }} \
            --docker-username=${{ github.actor }} \
            --docker-password=${{ secrets.GITHUB_TOKEN }} \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy with Helm
        run: |
          helm upgrade --install codepylot ./deploy/helm/codepylot \
            --namespace codepylot \
            --set image.repository=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }} \
            --set image.tag=${{ github.sha }} \
            --set image.pullPolicy=Always \
            --set env.AUTH_SECRET="${{ secrets.AUTH_SECRET }}" \
            --set env.ENCRYPTION_KEY="${{ secrets.ENCRYPTION_KEY }}" \
            --set env.CRON_SECRET="${{ secrets.CRON_SECRET }}" \
            --set env.GITHUB_ID="${{ secrets.OAUTH_GITHUB_ID }}" \
            --set env.GITHUB_SECRET="${{ secrets.OAUTH_GITHUB_SECRET }}" \
            --set env.GOOGLE_ID="${{ secrets.OAUTH_GOOGLE_ID }}" \
            --set env.GOOGLE_SECRET="${{ secrets.OAUTH_GOOGLE_SECRET }}" \
            --set ingress.hosts[0].host="${{ vars.DOMAIN }}" \
            --set ingress.hosts[0].paths[0].path=/ \
            --set ingress.hosts[0].paths[0].pathType=Prefix \
            --set ingress.tls[0].secretName=codepylot-tls \
            --set ingress.tls[0].hosts[0]="${{ vars.DOMAIN }}" \
            --wait \
            --timeout 5m \
            --history-max 5

      - name: Verify rollout
        run: |
          kubectl -n codepylot rollout status deployment/codepylot --timeout=3m
          echo "--- Pods ---"
          kubectl -n codepylot get pods -o wide
          echo "--- Services ---"
          kubectl -n codepylot get svc

      - name: Post-deploy health check
        run: |
          # Wait for ingress to propagate
          sleep 15
          HEALTH_URL="https://${{ vars.DOMAIN }}/api/health"
          for i in 1 2 3; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$HEALTH_URL" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed on attempt $i!"
              exit 0
            fi
            echo "Attempt $i: status $STATUS, retrying in 10s..."
            sleep 10
          done
          echo "Health check failed after 3 attempts"
          kubectl -n codepylot logs -l app.kubernetes.io/name=codepylot --tail=50
          exit 1

      - name: Notify deployment
        if: success()
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Image:** \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Namespace:** codepylot" >> $GITHUB_STEP_SUMMARY
          echo "- **URL:** https://${{ vars.DOMAIN }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY

  # ── Step 4: Rollback on failure ────────────────────────────
  rollback:
    runs-on: ubuntu-latest
    needs: deploy
    if: failure()
    environment: production

    steps:
      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Rollback to previous release
        run: |
          echo "Deployment failed, rolling back..."
          helm rollback codepylot -n codepylot
          kubectl -n codepylot rollout status deployment/codepylot --timeout=3m
          echo "Rollback complete"
