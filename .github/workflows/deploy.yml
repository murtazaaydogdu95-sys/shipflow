name: Build & deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - ".gitignore"
      - "docs/**"
      - ".github/workflows/ci.yml"
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    name: Build & push image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      sha-short: ${{ steps.sha.outputs.short }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to k3s
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Resolve image reference
        id: img
        run: echo "ref=ghcr.io/${{ github.repository }}:sha-${{ needs.build.outputs.sha-short }}" >> "$GITHUB_OUTPUT"

      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Trust VPS host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Sanity check — kubectl reachable on VPS
        run: |
          ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" '
            set -e
            export KUBECONFIG=$HOME/.kube/config
            command -v kubectl >/dev/null || { echo "kubectl not found in PATH"; exit 1; }
            kubectl get nodes >/dev/null || { echo "kubectl cannot reach the cluster — check ~/.kube/config"; exit 1; }
            echo "kubectl OK"
          '

      - name: Sync k8s manifests to VPS
        run: |
          ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" 'mkdir -p ~/shipflow/k8s'
          scp -r k8s/. "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:~/shipflow/k8s/"

      - name: Create namespace
        run: |
          ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            'export KUBECONFIG=$HOME/.kube/config && kubectl apply -f ~/shipflow/k8s/namespace.yaml'

      # No GHCR pull secret needed: the image package is public. (Creating one from
      # the ephemeral Actions token caused 403s on restart once the token expired,
      # and a stale secret even blocks anonymous pulls of a public image.)
      # If you make the package private again, recreate ghcr-login-secret from a
      # durable PAT with read:packages and re-add imagePullSecrets to the manifests.

      - name: Sync runtime secrets to cluster
        env:
          # Application secrets
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          GITHUB_OAUTH_ID: ${{ secrets.OAUTH_GITHUB_ID }}
          GITHUB_OAUTH_SECRET: ${{ secrets.OAUTH_GITHUB_SECRET }}
          GOOGLE_OAUTH_ID: ${{ secrets.OAUTH_GOOGLE_ID }}
          GOOGLE_OAUTH_SECRET: ${{ secrets.OAUTH_GOOGLE_SECRET }}
          # Agent runtime: Claude auth (API key OR subscription OAuth token) + git PAT
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          GIT_GITHUB_TOKEN: ${{ secrets.GIT_GITHUB_TOKEN }}
          # GitHub App (per-tenant git auth, Phase 2)
          GITHUB_APP_ID: ${{ secrets.GH_APP_ID }}
          GITHUB_APP_SLUG: ${{ secrets.GH_APP_SLUG }}
          GITHUB_APP_PRIVATE_KEY: ${{ secrets.GH_APP_PRIVATE_KEY }}
          # In-cluster Postgres credentials
          POSTGRES_USER: codepylot
          POSTGRES_DB: codepylot
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
        run: |
          # Fail early with a clear message if a required secret is missing/empty.
          # (An empty POSTGRES_PASSWORD makes the postgres image refuse to initialize.)
          : "${POSTGRES_PASSWORD:?repo secret POSTGRES_PASSWORD is not set}"
          : "${AUTH_SECRET:?repo secret AUTH_SECRET is not set}"
          : "${ENCRYPTION_KEY:?repo secret ENCRYPTION_KEY is not set}"
          : "${CRON_SECRET:?repo secret CRON_SECRET is not set}"

          # Build DATABASE_URL pointing at the in-cluster postgres Service
          DATABASE_URL="postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public"

          # Build the Secret YAML on the runner (values never appear in process listings)
          umask 077
          cat > /tmp/codepylot-secrets.yaml <<EOF
          apiVersion: v1
          kind: Secret
          metadata:
            name: codepylot-secret
            namespace: codepylot
          type: Opaque
          data:
            DATABASE_URL: $(printf '%s' "$DATABASE_URL" | base64 | tr -d '\n')
            AUTH_SECRET: $(printf '%s' "$AUTH_SECRET" | base64 | tr -d '\n')
            ENCRYPTION_KEY: $(printf '%s' "$ENCRYPTION_KEY" | base64 | tr -d '\n')
            CRON_SECRET: $(printf '%s' "$CRON_SECRET" | base64 | tr -d '\n')
            GITHUB_ID: $(printf '%s' "$GITHUB_OAUTH_ID" | base64 | tr -d '\n')
            GITHUB_SECRET: $(printf '%s' "$GITHUB_OAUTH_SECRET" | base64 | tr -d '\n')
            GOOGLE_ID: $(printf '%s' "$GOOGLE_OAUTH_ID" | base64 | tr -d '\n')
            GOOGLE_SECRET: $(printf '%s' "$GOOGLE_OAUTH_SECRET" | base64 | tr -d '\n')
            ANTHROPIC_API_KEY: $(printf '%s' "$ANTHROPIC_API_KEY" | base64 | tr -d '\n')
            CLAUDE_CODE_OAUTH_TOKEN: $(printf '%s' "$CLAUDE_CODE_OAUTH_TOKEN" | base64 | tr -d '\n')
            GIT_GITHUB_TOKEN: $(printf '%s' "$GIT_GITHUB_TOKEN" | base64 | tr -d '\n')
            GITHUB_APP_ID: $(printf '%s' "$GITHUB_APP_ID" | base64 | tr -d '\n')
            GITHUB_APP_SLUG: $(printf '%s' "$GITHUB_APP_SLUG" | base64 | tr -d '\n')
            GITHUB_APP_PRIVATE_KEY: $(printf '%s' "$GITHUB_APP_PRIVATE_KEY" | base64 | tr -d '\n')
            POSTGRES_USER: $(printf '%s' "$POSTGRES_USER" | base64 | tr -d '\n')
            POSTGRES_PASSWORD: $(printf '%s' "$POSTGRES_PASSWORD" | base64 | tr -d '\n')
            POSTGRES_DB: $(printf '%s' "$POSTGRES_DB" | base64 | tr -d '\n')
          EOF

          # Pipe through SSH stdin into kubectl apply — no temp file lands on the VPS
          ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            'export KUBECONFIG=$HOME/.kube/config && kubectl apply -f -' \
            < /tmp/codepylot-secrets.yaml

          rm /tmp/codepylot-secrets.yaml

      - name: Apply manifests & roll deployment
        run: |
          ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" "
            set -euo pipefail
            export KUBECONFIG=\$HOME/.kube/config

            # On rollout failure, dump why the pods aren't coming up.
            dump() {
              echo '----- diagnostics for app='\$1' -----'
              kubectl -n codepylot get pods -l app=\$1 -o wide || true
              kubectl -n codepylot describe pods -l app=\$1 || true
              echo '----- container logs -----'
              kubectl -n codepylot logs -l app=\$1 --tail=100 --all-containers=true --prefix || true
              echo '----- recent events -----'
              kubectl -n codepylot get events --sort-by=.lastTimestamp | tail -n 30 || true
            }

            # Postgres first (the app waits for it on startup)
            kubectl apply -f ~/shipflow/k8s/postgres.yaml
            # If the rollout stalls, the running pod may predate the current Secret
            # (env from a Secret is baked in at pod creation). Restart once to force a
            # fresh pod that re-reads the Secret, then wait again before giving up.
            if ! kubectl -n codepylot rollout status deploy/codepylot-postgres --timeout=2m; then
              echo 'postgres not ready — restarting to pick up the current secret…'
              kubectl -n codepylot rollout restart deploy/codepylot-postgres
              kubectl -n codepylot rollout status deploy/codepylot-postgres --timeout=3m || { dump codepylot-postgres; exit 1; }
            fi

            # Apply the rest (deployment, service, ingress, cronjobs)
            kubectl apply -f ~/shipflow/k8s/

            # Pin to the freshly built image SHA — gives proper rollback support
            kubectl -n codepylot set image deploy/codepylot web=${{ steps.img.outputs.ref }}

            # Keep the isolated-runner image (Phase 3) in lockstep with the app image
            kubectl -n codepylot set env deploy/codepylot RUNNER_IMAGE=${{ steps.img.outputs.ref }}

            # Always restart so the app picks up any changed Secret values (env from a
            # Secret is baked in at pod creation; set image to an unchanged SHA is a no-op).
            # Zero-downtime: the deployment uses maxUnavailable=0, maxSurge=1.
            kubectl -n codepylot rollout restart deploy/codepylot

            # Wait for new pods to come up
            kubectl -n codepylot rollout status deploy/codepylot --timeout=5m || { dump codepylot; exit 1; }
          "

      - name: Smoke test (https)
        run: |
          # First deploy: cert may take 30–90s to issue. Retry for up to 3 min.
          for i in $(seq 1 18); do
            code=$(curl -sS -o /dev/null -w "%{http_code}" -L https://codepylot.aydex.nl/api/health || true)
            if [ "$code" = "200" ]; then
              echo "✓ codepylot.aydex.nl/api/health returned 200"
              exit 0
            fi
            echo "Attempt $i: got '$code', retrying in 10s…"
            sleep 10
          done
          echo "✗ codepylot.aydex.nl did not return 200 within 3 minutes"
          echo "Cert may still be issuing — check: kubectl describe certificate codepylot-tls -n codepylot"
          exit 1
